<div class="container">
  <h1>{{title}}</h1>
  <hr>
  <div *ngIf="status == 'warning' " class="alert alert-warning alert-dismissible fade show" role="alert">
    {{message}}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div *ngIf="status == 'success' " class="alert alert-success alert-dismissible fade show" role="alert">
    {{message}}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <div *ngIf="status == 'danger' " class="alert alert-danger alert-dismissible fade show" role="alert">
    {{message}}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
  </div>
  <form #userEditForm="ngForm" (ngSubmit)="onSubmit(userEditForm)" class="col-lg-12">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" class="form-control" name="name" #name="ngModel" [(ngModel)]="user.name" required />
      <span *ngIf="!name.value && name.touched" class="">
        El nombre el obligatorio
      </span>
    </div>
    <div class="mb-3">
      <label class="form-label">Apellido</label>
      <input type="text" class="form-control" name="surname" #surname="ngModel" [(ngModel)]="user.surname" required />
      <span *ngIf="!surname.value && surname.touched" class="">
        El apellido el obligatorio
      </span>
    </div>
    <div class="mb-3">
      <label class="form-label">Nick</label>
      <input type="text" class="form-control" name="nick" #nick="ngModel" [(ngModel)]="user.nick" required />
      <span *ngIf="!nick.value && nick.touched" class="">
        El nick el obligatorio
      </span>
    </div>
    <div class="mb-3">
      <label class="form-label">Correo</label>
      <input type="email" class="form-control" name="email" #email="ngModel" [(ngModel)]="user.email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
      <span *ngIf="!email.value && email.touched" class="">
        El correo no es valido
      </span>
    </div>
    <div class="mb-3">
      <label class="form-label">Subir tu avatar</label>
      <input type="file" placeholder="subir imagen" (change)="fileChangeEvent($event)" />
    </div>
    <div class="mb-3" *ngIf="user.image">
      <img style="width: 200px;" src="{{ url + 'get-image-user/' + user.image }}" />
    </div>
    <input type="submit" value={{title}} class="btn btn-dark">
  </form>
</div>
