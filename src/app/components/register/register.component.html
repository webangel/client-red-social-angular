<div class="content">
  <div class="contentForm">
    <div class="content-user-total">
		  <div class="content-user-login">
		    <i class="icon-user-login">
          <img src="../../../assets/img/logo_scalar.png"  alt="logo">
        </i>
		  </div>
		</div>
    <h1>{{title}}</h1>
    <div *ngIf="status == 'warning' " class="alert alert-warning alert-dismissible fade show" role="alert">
      {{message}}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div *ngIf="status == 'success' " class="alert alert-success alert-dismissible fade show" role="alert">
      {{message}} <a [routerLink]="['/login']" >Indentificate aquí</a>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div *ngIf="status == 'danger' " class="alert alert-danger alert-dismissible fade show" role="alert">
      {{message}}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <form #registerForm="ngForm" (ngSubmit)="onSubmit(registerForm)" class="col-lg-10">
      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-control" name="name" #name="ngModel" [(ngModel)]="user.name" required />
        <span *ngIf="!name.valid && name.touched" class="">
          El nombre el obligatorio
        </span>
      </div>
      <div class="mb-3">
        <label class="form-label">Apellido</label>
        <input type="text" class="form-control" name="surname" #surname="ngModel" [(ngModel)]="user.surname" required />
        <span *ngIf="!surname.valid && surname.touched" class="">
          El apellido el obligatorio
        </span>
      </div>
      <div class="mb-3">
        <label class="form-label">Nick</label>
        <input type="text" class="form-control" name="nick" #nick="ngModel" [(ngModel)]="user.nick" required />
        <span *ngIf="!nick.valid && nick.touched" class="">
          El nick el obligatorio
        </span>
      </div>
      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input type="email" class="form-control" name="email" #email="ngModel" [(ngModel)]="user.email" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$">
        <span *ngIf="!email.valid && email.touched" class="">
          El correo no es valido
        </span>
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control"  name="password" #password="ngModel" [(ngModel)]="user.password" required>
        <span *ngIf="!password.valid && password.touched" class="">
          La contraseña el obligatorio
        </span>
      </div>
      <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="exampleCheck1">
        <label class="form-check-label" for="exampleCheck1">Aceptar los terminos</label>
      </div>
      <input type="submit" value={{title}} class="btn btn-primary btn-submit">
    </form>
  </div>
</div>
